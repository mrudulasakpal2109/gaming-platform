name: Flask CI & Production Packaging

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Wakes up when a Semantic Version tag (e.g., v1.0.0) is pushed
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # JOB 1: Validates code quality on normal commits
  test-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install --no-cache-dir -r requirements.txt; fi

      - name: Verify Flask Import
        run: |
          python -c "import flask"

  # JOB 2: Generates the downloadable ZIP/Tarball archive (Only on tags!)
  manufacture-artifact:
    needs: test-and-verify # Ensures tests pass first
    if: startsWith(github.ref, 'refs/tags/v') # ONLY runs when you push a tag (like v1.0.0)
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Source Code Repository
        uses: actions/checkout@v4

      - name: Extract Tag and Short Git Commit SHA
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "clean_tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Initialize Docker Buildx
        uses: docker/setup-buildx-action@v3

      # NOTE: Your professor's script uses a "Makefile". 
      # If you don't have a Makefile, this fallback build & save sequence ensures a downloadable tarball is created.
      - name: Execute Package Routine
        run: |
          VERSION_STRING="${{ steps.meta.outputs.clean_tag }}-${{ steps.meta.outputs.sha_short }}"
          FILENAME="local-flask-app-${{ steps.meta.outputs.clean_tag }}-${{ steps.meta.outputs.sha_short }}.tar"
          
          echo "Building image version: $VERSION_STRING"
          docker build -t gaming-platform:$VERSION_STRING .
          
          echo "Saving container to tar archive..."
          docker save gaming-platform:$VERSION_STRING -o $FILENAME

      - name: Upload Container Tarball Archive to GitHub Storage
        uses: actions/upload-artifact@v4
        with:
          name: flask-production-package-${{ steps.meta.outputs.clean_tag }}
          path: local-flask-app-${{ steps.meta.outputs.clean_tag }}-*.tar
          retention-days: 7