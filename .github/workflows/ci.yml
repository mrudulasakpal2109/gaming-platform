name: Flask CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Lock down permissions
permissions:
  contents: read

# Prevent multiple runs on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Clean install
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      # Basic verification
      - name: Verify Flask Import
        run: |
          python -c "import flask"

      # Docker build
      - name: Build Docker Image
        run: |
          docker build -t gaming-platform .